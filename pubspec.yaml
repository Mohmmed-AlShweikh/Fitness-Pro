name: fitness_pro
description: "FitTrack Pro - A complete fitness tracking application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  go_router: ^14.2.3
  fl_chart: ^0.68.0
  pdf: ^3.10.8
  printing: ^5.12.0
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
