name: fitness_pro
description: "FitTrack Pro - A complete fitness tracking application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  go_router: 14.6.3
  fl_chart: 0.69.0
  pdf: 3.11.2
  printing: 5.12.0
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.2
  shared_preferences: 2.3.4
  intl: 0.19.0
  image_picker: 1.1.2
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8


flutter:
  uses-material-design: true

  assets:
    - assets/images/


# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/fitness.png
  min_sdk_android: 21


# Splash Screen Configuration
flutter_native_splash:
  color: "#6C5CE7"
  image: assets/images/fitness.png

  android: true
  ios: true
  web: false

  android_12:
    color: "#6C5CE7"
    image: assets/images/fitness.png