name: fitness_pro
description: "FitTrack Pro - A complete fitness tracking application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  go_router: ^17.3.0
  fl_chart: ^1.2.0
  pdf: ^3.13.0
  printing: ^5.15.0
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.2.0
  shared_preferences: ^2.5.5
  intl: ^0.20.3
  image_picker: ^1.2.3
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
